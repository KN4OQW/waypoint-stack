name: Build stack

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NFPM_VERSION: "2.43.0"

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64: native on the x86-64 runner (CI/dev convenience).
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            qemu: false
          # arm64: native on the arm64 runner (Pi 3/4 64-bit).
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            qemu: false
          # armhf: ARMv7 container on the arm64 runner. Server-class ARMv8
          # (the runner) does not execute aarch32, so this runs under QEMU.
          - arch: armhf
            runner: ubuntu-24.04-arm
            platform: linux/arm/v7
            qemu: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pinned sources
        run: |
          set -e
          source pins.env
          git clone "$MMDVM_HOST_REPO" src/MMDVM-Host
          git -C src/MMDVM-Host checkout "$MMDVM_HOST_SHA"
          git clone "$DMRGATEWAY_REPO" src/DMRGateway
          git -C src/DMRGateway checkout "$DMRGATEWAY_SHA"
          git clone "$YSFCLIENTS_REPO" src/YSFClients
          git -C src/YSFClients checkout "$YSFCLIENTS_SHA"
          git clone "$P25CLIENTS_REPO" src/P25Clients
          git -C src/P25Clients checkout "$P25CLIENTS_SHA"
          git clone "$NXDNCLIENTS_REPO" src/NXDNClients
          git -C src/NXDNClients checkout "$NXDNCLIENTS_SHA"
          git clone "$DSTARGATEWAY_REPO" src/DStarGateway
          git -C src/DStarGateway checkout "$DSTARGATEWAY_SHA"
          git clone "$M17GATEWAY_REPO" src/M17Gateway
          git -C src/M17Gateway checkout "$M17GATEWAY_SHA"

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3

      - name: Build (${{ matrix.arch }})
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD:/w" -w /w debian:bookworm \
            bash build.sh out/${{ matrix.arch }}

      - name: Install nfpm
        run: |
          host_arch="$(dpkg --print-architecture)"
          curl -fsSL -o /tmp/nfpm.deb \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_${host_arch}.deb"
          sudo dpkg -i /tmp/nfpm.deb
          nfpm --version

      - name: Package .debs (${{ matrix.arch }})
        run: packaging/build-debs.sh ${{ matrix.arch }} out/${{ matrix.arch }} debs/${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: waypoint-stack-debs-${{ matrix.arch }}
          path: debs/${{ matrix.arch }}/*.deb
          if-no-files-found: error

  install-test:
    name: install-test (${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            qemu: false
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            qemu: false
          - arch: armhf
            runner: ubuntu-24.04-arm
            platform: linux/arm/v7
            qemu: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: waypoint-stack-debs-${{ matrix.arch }}
          path: debs

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3

      # Fresh container of the matching arch: dpkg -i the metapackage + daemons,
      # resolve the declared deps, and run every binary's version banner. A binary
      # that needs an undeclared shared library fails here.
      - name: Install + probe (${{ matrix.arch }})
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/debs:/debs:ro" -v "$PWD/packaging:/packaging:ro" \
            debian:bookworm bash /packaging/install-test.sh

  # Assemble every built .deb into one signed apt repository and publish it to
  # GitHub Pages at https://kn4oqw.github.io/waypoint-stack. The Waypoint image
  # (KN4OQW/waypoint) installs the stack from this repo as a deb822 source and
  # pins the archive keyring by sha256, so publish-apt.sh asserts the exported
  # keyring still matches that pin. Runs on push to main / manual dispatch, not on
  # PRs (a fork PR cannot access the signing secret, and must not publish).
  publish:
    name: publish apt repo
    needs: [build, install-test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download built .debs
        uses: actions/download-artifact@v4
        with:
          pattern: waypoint-stack-debs-*
          path: incoming

      - name: Assemble + sign the apt repository
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
          APT_SIGNING_PASSPHRASE: ${{ secrets.APT_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${APT_SIGNING_KEY:-}" ] || [ -z "${APT_SIGNING_PASSPHRASE:-}" ]; then
            echo "::error::APT_SIGNING_KEY / APT_SIGNING_PASSPHRASE not set — cannot sign the repo."
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y apt-utils
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          install -d -m 700 "$GNUPGHOME"
          printf '%s' "$APT_SIGNING_KEY" | gpg --batch --import
          packaging/publish-apt.sh incoming public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # Deploy the signed repo to Pages. Isolated from the build matrix so it alone
  # carries the elevated Pages permissions. Serialized on the "pages" group so
  # concurrent main pushes cannot race a half-published repo.
  deploy:
    name: deploy to Pages
    needs: publish
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
