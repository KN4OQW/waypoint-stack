# nfpm config for waypoint-ysfparrot. PKG_ARCH is set in the environment and binaries are staged
# into packaging/staging/ by packaging/build-debs.sh; the
# version is pinned to the upstream commit (see pins.env: YSFCLIENTS_SHA).
# The parrot does not link libmosquitto (no MQTT dependency).
name: waypoint-ysfparrot
arch: ${PKG_ARCH}
platform: linux
version: "0~git2b480aa+wp1"
version_schema: none
section: hamradio
priority: optional
maintainer: "Waypoint <clintchance@gmail.com>"
vendor: Waypoint
homepage: https://github.com/KN4OQW/waypoint-stack
license: GPL-2.0-or-later
description: |
  System Fusion echo/parrot test service.

  Local YSF echo service for loopback testing. Built from YSFClients. Ships
  the binary only; configuration and systemd units are rendered and managed
  by waypointd.
depends:
  - libc6 (>= 2.34)
  - libgcc-s1 (>= 3.5)
  - libstdc++6 (>= 5.2)
contents:
  - src: packaging/staging/YSFParrot
    dst: /usr/bin/YSFParrot
    file_info:
      mode: 0755
  - src: packaging/copyright
    dst: /usr/share/doc/waypoint-ysfparrot/copyright
    file_info:
      mode: 0644
