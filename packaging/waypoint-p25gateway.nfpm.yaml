# nfpm config for waypoint-p25gateway. PKG_ARCH is set in the environment and binaries are staged
# into packaging/staging/ by packaging/build-debs.sh; the
# version is pinned to the upstream commit (see pins.env: P25CLIENTS_SHA).
name: waypoint-p25gateway
arch: ${PKG_ARCH}
platform: linux
version: "0~git9751c6e+wp1"
version_schema: none
section: hamradio
priority: optional
maintainer: "Waypoint <clintchance@gmail.com>"
vendor: Waypoint
homepage: https://github.com/KN4OQW/waypoint-stack
license: GPL-2.0-or-later
description: |
  P25 reflector gateway.

  Connects MMDVM-Host to P25 reflectors. Built from P25Clients. Ships the
  binary only; configuration and systemd units are rendered and managed by
  waypointd.
depends:
  - libc6 (>= 2.34)
  - libgcc-s1 (>= 3.5)
  - libmosquitto1 (>= 1.6)
  - libstdc++6 (>= 11)
contents:
  - src: packaging/staging/P25Gateway
    dst: /usr/bin/P25Gateway
    file_info:
      mode: 0755
  - src: packaging/copyright
    dst: /usr/share/doc/waypoint-p25gateway/copyright
    file_info:
      mode: 0644
