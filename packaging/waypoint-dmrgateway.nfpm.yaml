# nfpm config for waypoint-dmrgateway. PKG_ARCH is set in the environment and binaries are staged
# into packaging/staging/ by packaging/build-debs.sh; the
# version is pinned to the upstream commit (see pins.env: DMRGATEWAY_SHA).
name: waypoint-dmrgateway
arch: ${PKG_ARCH}
platform: linux
version: "0~git79edbc4+wp1"
version_schema: none
section: hamradio
priority: optional
maintainer: "Waypoint <clintchance@gmail.com>"
vendor: Waypoint
homepage: https://github.com/KN4OQW/waypoint-stack
license: GPL-2.0-or-later
description: |
  DMR gateway routing between MMDVM-Host and DMR networks.

  Rewrites and routes DMR traffic between MMDVM-Host and multiple DMR
  networks (BrandMeister, TGIF, and others). Ships the binary only;
  configuration and systemd units are rendered and managed by waypointd.
depends:
  - libc6 (>= 2.34)
  - libgcc-s1 (>= 3.5)
  - libmosquitto1 (>= 1.6)
  - libstdc++6 (>= 11)
contents:
  - src: packaging/staging/DMRGateway
    dst: /usr/bin/DMRGateway
    file_info:
      mode: 0755
  - src: packaging/copyright
    dst: /usr/share/doc/waypoint-dmrgateway/copyright
    file_info:
      mode: 0644
