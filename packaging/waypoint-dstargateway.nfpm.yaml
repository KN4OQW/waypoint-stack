# nfpm config for waypoint-dstargateway. PKG_ARCH is set in the environment and binaries are staged
# into packaging/staging/ by packaging/build-debs.sh; the
# version is pinned to the upstream commit (see pins.env: DSTARGATEWAY_SHA).
# The upstream binary is lowercase "dstargateway".
name: waypoint-dstargateway
arch: ${PKG_ARCH}
platform: linux
version: "0~git612f388+wp1"
version_schema: none
section: hamradio
priority: optional
maintainer: "Waypoint <clintchance@gmail.com>"
vendor: Waypoint
homepage: https://github.com/KN4OQW/waypoint-stack
license: GPL-2.0-or-later
description: |
  D-Star gateway (ircDDB / DCS / DPlus / DExtra).

  Connects MMDVM-Host to D-Star reflectors and the ircDDB network. Built
  from DStarGateway (the gateway target only). Ships the binary only;
  configuration and systemd units are rendered and managed by waypointd.
depends:
  - libc6 (>= 2.34)
  - libgcc-s1 (>= 3.5)
  - libmosquitto1 (>= 1.6)
  - libstdc++6 (>= 11)
contents:
  - src: packaging/staging/dstargateway
    dst: /usr/bin/dstargateway
    file_info:
      mode: 0755
  - src: packaging/copyright
    dst: /usr/share/doc/waypoint-dstargateway/copyright
    file_info:
      mode: 0644
