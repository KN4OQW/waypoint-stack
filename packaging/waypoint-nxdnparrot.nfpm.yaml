# nfpm config for waypoint-nxdnparrot. PKG_ARCH is set in the environment and binaries are staged
# into packaging/staging/ by packaging/build-debs.sh; the
# version is pinned to the upstream commit (see pins.env: NXDNCLIENTS_SHA).
# The parrot does not link libmosquitto (no MQTT dependency).
name: waypoint-nxdnparrot
arch: ${PKG_ARCH}
platform: linux
version: "0~git18b4e9a+wp1"
version_schema: none
section: hamradio
priority: optional
maintainer: "Waypoint <clintchance@gmail.com>"
vendor: Waypoint
homepage: https://github.com/KN4OQW/waypoint-stack
license: GPL-2.0-or-later
description: |
  NXDN echo/parrot test service.

  Local NXDN echo service for loopback testing. Built from NXDNClients. Ships
  the binary only; configuration and systemd units are rendered and managed
  by waypointd.
depends:
  - libc6 (>= 2.34)
  - libgcc-s1 (>= 3.5)
  - libstdc++6 (>= 5.2)
contents:
  - src: packaging/staging/NXDNParrot
    dst: /usr/bin/NXDNParrot
    file_info:
      mode: 0755
  - src: packaging/copyright
    dst: /usr/share/doc/waypoint-nxdnparrot/copyright
    file_info:
      mode: 0644
